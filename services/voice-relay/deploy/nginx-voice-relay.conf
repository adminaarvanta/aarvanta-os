# Place under /etc/nginx/sites-available/ (or include in existing onboarding host).
# Terminate TLS on the same certificate as onboarding.aarvanta.co (or voice.aarvanta.co).

# Example path-based proxy on the existing onboarding host:
#
# location /voice-relay/ {
#     proxy_pass http://127.0.0.1:8090/;
#     proxy_http_version 1.1;
#     proxy_set_header Upgrade $http_upgrade;
#     proxy_set_header Connection "upgrade";
#     proxy_set_header Host $host;
#     proxy_set_header X-Forwarded-Proto $scheme;
#     proxy_set_header X-Forwarded-Host $host;
#     proxy_read_timeout 3600s;
# }

# Then set:
#   VOICE_RELAY_WSS_URL=wss://onboarding.aarvanta.co/voice-relay/ws
#   (must match TwiML <ConversationRelay url> exactly — trailing slash matters)

server {
    listen 443 ssl http2;
    server_name voice.aarvanta.co;

    # ssl_certificate     /etc/letsencrypt/live/voice.aarvanta.co/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/voice.aarvanta.co/privkey.pem;

    location /health {
        proxy_pass http://127.0.0.1:8090/health;
        proxy_set_header Host $host;
    }

    location /ws {
        proxy_pass http://127.0.0.1:8090/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 3600s;
    }
}
